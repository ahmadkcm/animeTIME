<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>animeTIME</title>
<style>
body{
  margin:0;
  font-family:Segoe UI;
  color:white;
  background:linear-gradient(-45deg,#6d28d9,#7c3aed,#db2777,#ec4899);
  background-size:400% 400%;
  animation:move 20s infinite ease;
}
@keyframes move{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}
header{text-align:center;padding:40px;}
button{
  padding:8px 15px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  margin:5px;
}
.container{max-width:1100px;margin:auto;padding:30px;}
.card{
  background:rgba(255,255,255,.15);
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}
.card img{
  width:200px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
<h1>animeTIME</h1>
<button onclick="loadAnime()">Anime</button>
<button onclick="loadGaming()">Gaming</button>
</header>

<div class="container" id="content"></div>

<script>
function render(list){
  const box=document.getElementById("content");
  box.innerHTML="";
  list.forEach(item=>{
    box.innerHTML+=`
      <div class="card">
        <h2>${item.title}</h2>
        ${item.image ? `<img src="${item.image}">` : ""}
        <p>${item.description}</p>
        <a href="${item.link}" target="_blank">
          <button>Read More</button>
        </a>
      </div>
    `;
  });
}

async function loadAnime(){
  const res=await fetch("/api/anime");
  const json=await res.json();
  render(json.data);
}

async function loadGaming(){
  const res=await fetch("/api/gaming");
  const json=await res.json();
  render(json.data);
}

loadAnime();
</script>

</body>
</html>
