<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>animeTIME</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI, sans-serif;
    color:white;
    min-height:100vh;
    overflow-x:hidden;
    background:linear-gradient(-45deg,#6d28d9,#7c3aed,#db2777,#ec4899);
    background-size:400% 400%;
    animation:gradientMove 18s ease infinite;
}

/* حركة الخلفية */
@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

header{
    text-align:center;
    padding:60px 20px 30px 20px;
}

header h1{
    font-size:48px;
    margin-bottom:10px;
}

header p{
    opacity:.9;
    margin-bottom:20px;
}

button{
    padding:10px 22px;
    border:none;
    border-radius:25px;
    cursor:pointer;
    font-weight:bold;
    background:white;
    color:#7c3aed;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

.searchBox{
    margin-top:20px;
}

.searchBox input{
    width:300px;
    padding:10px 15px;
    border-radius:25px;
    border:none;
    outline:none;
}

/* محتوى */
.container{
    max-width:1100px;
    margin:auto;
    padding:40px 20px;
}

/* كروت */
.card{
    display:flex;
    gap:20px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:20px;
    margin-bottom:30px;
    transition:.3s;
}

.card:hover{
    transform:translateY(-6px);
}

.card img{
    width:160px;
    height:220px;
    border-radius:15px;
    object-fit:cover;
}

.card h3{
    margin-bottom:8px;
}

.card p{
    opacity:.9;
    font-size:14px;
}

/* زر تحميل */
.loadMore{
    display:block;
    margin:40px auto;
}

/* تذييل */
footer{
    text-align:center;
    padding:40px 20px;
    background:rgba(0,0,0,.15);
    backdrop-filter:blur(10px);
}
</style>
</head>

<body>

<header>
    <h1>animeTIME</h1>
    <p>Real Anime News & Live Search</p>

    <div class="searchBox">
        <input type="text" id="search" placeholder="Search anime...">
    </div>

    <br>
    <button onclick="toggleMode()">Toggle Mode</button>
</header>

<div class="container">
    <div id="news"></div>
    <button class="loadMore" onclick="loadNews()">Load More</button>
</div>

<footer>
    <h3>Contact Us</h3>
    <p>📧 akacemahmad@gmail.com</p>
</footer>

<script>
let page = 1;
let searching = false;

/* Dark mode */
function toggleMode(){
    document.body.classList.toggle("dark");
}

/* عرض البيانات */
function render(list){
    const box = document.getElementById("news");
    list.forEach(anime=>{
        const div = document.createElement("div");
        div.className="card";
        div.innerHTML=`
            <img src="${anime.image}">
            <div>
                <h3>${anime.title}</h3>
                <p>${anime.description?.substring(0,250) || ""}...</p>
            </div>
        `;
        box.appendChild(div);
    });
}

/* تحميل الأخبار */
async function loadNews(){
    if(searching) return;

    const res = await fetch(`/api/news?page=${page}&limit=6`);
    const json = await res.json();
    render(json.data);
    page++;
}

/* البحث */
document.getElementById("search").addEventListener("input", async (e)=>{
    const value = e.target.value.trim();
    const box = document.getElementById("news");

    if(value.length > 1){
        searching = true;
        box.innerHTML="";
        const res = await fetch(`/api/search?q=${value}`);
        const json = await res.json();
        render(json.data);
    }else{
        searching = false;
        box.innerHTML="";
        page=1;
        loadNews();
    }
});

/* تحميل أول مرة */
loadNews();
</script>

</body>
</html>
