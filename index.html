<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>animeTIME</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Segoe UI,sans-serif;
    min-height:100vh;
    color:white;
    background:linear-gradient(-45deg,#6d28d9,#7c3aed,#db2777,#ec4899);
    background-size:400% 400%;
    animation:gradientMove 18s ease infinite;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

header{
    text-align:center;
    padding:60px 20px;
}

.searchBox input{
    width:300px;
    padding:10px 15px;
    border-radius:25px;
    border:none;
    outline:none;
    margin-top:15px;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:40px 20px;
}

.card{
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:20px;
    margin-bottom:30px;
}

.card img{
    width:180px;
    border-radius:15px;
    margin-bottom:15px;
}

button{
    padding:8px 16px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    margin-top:10px;
    background:white;
    color:#7c3aed;
    font-weight:bold;
}

footer{
    text-align:center;
    padding:40px;
}
</style>
</head>

<body>

<header>
    <h1>animeTIME</h1>
    <p>Official Anime News & Sources</p>

    <div class="searchBox">
        <input type="text" id="search" placeholder="Search anime...">
    </div>
</header>

<div class="container">
    <div id="news"></div>
    <button onclick="loadNews()">Load More</button>
</div>

<footer>
    <h3>Contact Us</h3>
    <p>📧 akacemahmad@gmail.com</p>
</footer>

<script>
let page = 1;
let searching = false;

function render(list){
    const box = document.getElementById("news");

    list.forEach(anime=>{
        const div = document.createElement("div");
        div.className="card";

        div.innerHTML=`
            <h2>${anime.title}</h2>
            <img src="${anime.image}">
            <p>${anime.description.substring(0,250)}...</p>

            <div>
                <a href="${anime.mal_url}" target="_blank">
                    <button>View on MyAnimeList</button>
                </a>

                ${anime.official_site
                    ? `<a href="${anime.official_site}" target="_blank">
                         <button>Official Website</button>
                       </a>`
                    : ""
                }
            </div>
        `;

        box.appendChild(div);
    });
}

async function loadNews(){
    if(searching) return;

    const res = await fetch(`/api/news?page=${page}&limit=5`);
    const json = await res.json();

    render(json.data);
    page++;
}

document.getElementById("search").addEventListener("input", async (e)=>{
    const value = e.target.value.trim();
    const box = document.getElementById("news");

    if(value.length > 1){
        searching = true;
        box.innerHTML="";
        const res = await fetch(`/api/search?q=${value}`);
        const json = await res.json();
        render(json.data);
    }else{
        searching = false;
        box.innerHTML="";
        page=1;
        loadNews();
    }
});

loadNews();
</script>

</body>
</html>
